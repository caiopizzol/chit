name: release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bun run typecheck
      - run: bun run test
      # Validate the publishable bundle builds on every push (bun publish also
      # rebuilds it via prepack during the release).
      - name: Build CLI bundle
        run: bun --filter @chit-run/cli build
      # bun publish and bun pm whoami read the auth token from .npmrc.
      - name: Configure npm auth
        if: ${{ env.NPM_TOKEN != '' }}
        run: |
          printf '%s\n' "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
          printf '%s\n' "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > apps/cli/.npmrc
      - name: Release
        if: ${{ env.NPM_TOKEN != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx semantic-release
      - name: Skip release (no NPM_TOKEN)
        if: ${{ env.NPM_TOKEN == '' }}
        run: echo "NPM_TOKEN is not set; gates passed but publish is skipped. Add the NPM_TOKEN secret to enable releases."
