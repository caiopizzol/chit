name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Checks for pull requests. On a merge to main these same steps run inline in
  # the deploy job, so we skip this job on push to avoid running them twice.
  check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bun run typecheck
      - run: bun run test
      - run: bun run check:browser
      - run: bun run site:build

  # On a merge to main: run the checks, then deploy the site to Cloudflare Pages,
  # all in one job. Steps fail-fast, so a failed check never reaches the deploy.
  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bun run typecheck
      - run: bun run test
      - run: bun run check:browser
      - run: bun run site:build
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/site
          command: pages deploy out --project-name=chit-site
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
