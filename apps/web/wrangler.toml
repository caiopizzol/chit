name = "chit-web"
main = "src/index.tsx"
compatibility_date = "2026-05-28"

# Keep the default *.workers.dev subdomain alive alongside the custom
# domain so deploys remain testable without DNS. Flip to false later
# if you want to retire it.
workers_dev = true

[assets]
directory = "./public"
binding = "ASSETS"

[observability]
enabled = true
head_sampling_rate = 1

# Production custom domain. chit.run is the brand domain
# (acquired 2026-05-28).
[[routes]]
pattern = "chit.run"
custom_domain = true
