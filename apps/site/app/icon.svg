<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <title>chit icon</title>
  <!-- chit icon, transparent background, adaptive color. Ink on light, paper on dark.
       Use this as the SVG favicon (app/icon.svg). PNG exports freeze to one color. -->
  <style>
    .glyph { stroke: #0A0A0A; }
    .dot   { fill:   #0A0A0A; }
    @media (prefers-color-scheme: dark) {
      .glyph { stroke: #F4F1E8; }
      .dot   { fill:   #F4F1E8; }
    }
  </style>
  <circle class="glyph" cx="256" cy="256" r="128" fill="none" stroke-width="72"
          stroke-linecap="round" stroke-dasharray="589.8 214.4" stroke-dashoffset="697.0"/>
  <circle class="dot" cx="256" cy="256" r="40"/>
</svg>
